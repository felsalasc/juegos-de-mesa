<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administrar Productos - NortLAB</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="admin-productos.html">NortLAB Admin</a>

        <div class="d-flex gap-2">
            <a class="btn btn-light btn-sm" href="admin-productos.html">Productos</a>
            <a class="btn btn-light btn-sm" href="admin-usuarios.html">Usuarios</a>
            <a class="btn btn-light btn-sm" href="catalogo.html">Catálogo</a>
        </div>

        <div id="menuUsuario" class="ms-3"></div>
    </div>
</nav>

<header class="container mt-4">
    <div class="p-4 bg-white rounded shadow-sm">
        <h1 class="mb-2">Mantenedor de productos</h1>
        <p class="text-muted mb-0">
            Desde esta sección puedes crear, editar y eliminar juegos disponibles en el catálogo.
        </p>
    </div>
</header>

<main class="container mt-4">

    <section class="card shadow-sm mb-4">
        <div class="card-body">
            <h4 class="mb-3">Formulario de producto</h4>

            <form id="formProducto" class="row">
                <input type="hidden" id="idProducto">

                <div class="col-12 col-md-6 col-lg-4 mb-3">
                    <label class="form-label">Nombre del producto</label>
                    <input type="text" class="form-control" id="nombre" placeholder="Ej: Aventura Diaguita">
                </div>

                <div class="col-12 col-md-6 col-lg-4 mb-3">
                    <label class="form-label">Categoría</label>
                    <input type="text" class="form-control" id="categoria" placeholder="Ej: Cultura Diaguita">
                </div>

                <div class="col-12 col-md-6 col-lg-4 mb-3">
                    <label class="form-label">Precio</label>
                    <input type="number" class="form-control" id="precio" placeholder="Ej: 12990">
                </div>

                <div class="col-12 col-md-6 col-lg-4 mb-3">
                    <label class="form-label">Stock</label>
                    <input type="number" class="form-control" id="stock" placeholder="Ej: 10">
                </div>

                <div class="col-12 col-md-6 col-lg-4 mb-3">
                    <label class="form-label">Ruta de imagen</label>
                    <input type="text" class="form-control" id="imagen" placeholder="Ej: img/juego1.jpg">
                </div>

                <div class="col-12 col-md-6 col-lg-4 mb-3 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">
                        Guardar producto
                    </button>
                </div>
            </form>
        </div>
    </section>

    <section class="card shadow-sm">
        <div class="card-body">
            <h4 class="mb-3">Listado de productos</h4>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Nombre</th>
                            <th>Categoría</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaProductos"></tbody>
                </table>
            </div>
        </div>
    </section>

</main>

<footer>
    <p class="mb-0">NortLAB - Panel de administración</p>
</footer>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin-productos.js"></script>

</body>
</html>
