<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Administrar Usuarios - NortLAB</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="admin-productos.html">NortLAB Admin</a>

        <div class="d-flex gap-2">
            <a class="btn btn-light btn-sm" href="admin-productos.html">Productos</a>
            <a class="btn btn-light btn-sm" href="admin-usuarios.html">Usuarios</a>
            <a class="btn btn-light btn-sm" href="catalogo.html">Catálogo</a>
        </div>

        <div id="menuUsuario" class="ms-3"></div>
    </div>
</nav>

<header class="container mt-4">
    <div class="p-4 bg-white rounded shadow-sm">
        <h1 class="mb-2">Administración de Usuarios</h1>
        <p class="text-muted mb-0">
            Visualiza los usuarios registrados en la plataforma y sus respectivos roles.
        </p>
    </div>
</header>

<main class="container mt-4">

    <section class="card shadow-sm">
        <div class="card-body">

            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="mb-0">Usuarios Registrados</h4>

                <span class="badge bg-primary" id="totalUsuarios">
                    0 usuarios
                </span>
            </div>

            <div class="table-responsive">

                <table class="table table-bordered table-hover align-middle mb-0">

                    <thead class="table-light">
                        <tr>
                            <th>Nombre</th>
                            <th>Usuario</th>
                            <th>Correo Electrónico</th>
                            <th>Rol</th>
                            <th>Fecha Nacimiento</th>
                            <th>Dirección</th>
                        </tr>
                    </thead>

                    <tbody id="tablaUsuarios">
                    </tbody>

                </table>

            </div>

        </div>
    </section>

</main>

<footer>
    <p class="mb-0">
        NortLAB - Panel de administración
    </p>
</footer>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/admin-usuarios.js"></script>

</body>
</html>
