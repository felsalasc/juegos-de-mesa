<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - NortLAB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<main class="container">
  <div class="form-container">
    <h2>Inicio de sesión</h2>

    <form id="formLogin">
      <input class="form-control mb-3" id="email" placeholder="Correo electrónico">
      <input class="form-control mb-3" id="password" type="password" placeholder="Contraseña">

      <button class="btn btn-primary w-100" type="submit">Ingresar</button>
    </form>

    <p class="mt-3">
      <a href="registro.html">Crear cuenta</a> |
      <a href="recuperar.html">Recuperar contraseña</a>
    </p>
  </div>
</main>

<script src="js/data.js"></script>
<script src="js/login.js"></script>
</body>
</html>
