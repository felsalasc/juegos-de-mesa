<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña - NortLAB</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="index.html">NortLAB</a>

        <div class="d-flex gap-2">
            <a class="btn btn-light btn-sm" href="login.html">Iniciar Sesión</a>
            <a class="btn btn-light btn-sm" href="registro.html">Registrarse</a>
        </div>
    </div>
</nav>

<header class="container mt-4">
    <div class="p-4 bg-white rounded shadow-sm">
        <h1 class="mb-2">Recuperar Contraseña</h1>
        <p class="text-muted mb-0">
            Ingresa el correo electrónico asociado a tu cuenta para recuperar el acceso.
        </p>
    </div>
</header>

<main class="container mt-4">

    <div class="row justify-content-center">

        <div class="col-12 col-md-8 col-lg-6">

            <div class="card shadow-sm">

                <div class="card-body">

                    <h4 class="mb-3">
                        Recuperación de acceso
                    </h4>

                    <form id="formRecuperar">

                        <div class="mb-3">
                            <label class="form-label">
                                Correo electrónico
                            </label>

                            <input
                                type="email"
                                class="form-control"
                                id="email"
                                placeholder="correo@ejemplo.com">
                        </div>

                        <div class="d-grid gap-2">

                            <button
                                type="submit"
                                class="btn btn-primary">
                                Recuperar contraseña
                            </button>

                            <a
                                href="login.html"
                                class="btn btn-outline-secondary">
                                Volver al inicio de sesión
                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</main>

<footer>
    <p class="mb-0">
        NortLAB - Juegos de mesa culturales
    </p>
</footer>

<script src="js/data.js"></script>
<script src="js/recuperar.js"></script>

</body>
</html>
