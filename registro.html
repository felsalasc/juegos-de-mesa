<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro - NortLAB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="index.html">NortLAB</a>
  </div>
</nav>

<main class="container">
  <div class="form-container">
    <h2>Registro de usuario</h2>

    <form id="formRegistro">
      <input class="form-control mb-3" id="nombre" placeholder="Nombre completo">
      <input class="form-control mb-3" id="usuario" placeholder="Nombre de usuario">
      <input class="form-control mb-3" id="email" placeholder="Correo electrónico">
      <input class="form-control mb-3" id="password" type="password" placeholder="Contraseña">
      <input class="form-control mb-3" id="repetirPassword" type="password" placeholder="Repetir contraseña">
      <input class="form-control mb-3" id="fechaNacimiento" type="date">
      <input class="form-control mb-3" id="direccion" placeholder="Dirección de despacho">

      <button class="btn btn-primary w-100" type="submit">Registrarme</button>
    </form>

    <p class="mt-3">
      ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
    </p>
  </div>
</main>

<script src="js/data.js"></script>
<script src="js/registro.js"></script>
</body>
</html>
