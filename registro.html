<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de compradores</title>
  <link rel="stylesheet" href="css/registro.css">
</head>
<body>

  <header class="header">
    <h1>Juegos de Mesa</h1>

    <nav class="menu">
      <a href="index.html">Inicio</a>
      <a href="exploradores.html">Exploradores</a>
      <a href="atacamena.html">Atacameña</a>
      <a href="changa.html">Changa</a>
      <a href="diaguita.html">Diaguita</a>
      <a href="registro.html" class="activo">Registro</a>
    </nav>
  </header>

  <main class="contenedor">
    <section class="formulario-card">
      <h2>Registro de compradores</h2>
      <p>Completa tus datos para registrarte y acceder a futuras recompensas.</p>

      <form id="formRegistro" novalidate>

        <div class="grupo">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" name="nombre">
          <small class="error"></small>
        </div>

        <div class="grupo">
          <label for="usuario">Nombre de usuario</label>
          <input type="text" id="usuario" name="usuario">
          <small class="error"></small>
        </div>

        <div class="grupo">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" name="email">
          <small class="error"></small>
        </div>

        <div class="grupo">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password">
          <small class="error"></small>
        </div>

        <div class="grupo">
          <label for="repetirPassword">Repetir contraseña</label>
          <input type="password" id="repetirPassword" name="repetirPassword">
          <small class="error"></small>
        </div>

        <div class="grupo">
          <label for="fechaNacimiento">Fecha de nacimiento</label>
          <input type="date" id="fechaNacimiento" name="fechaNacimiento">
          <small class="error"></small>
        </div>

        <div class="grupo">
          <label for="direccion">Dirección de despacho opcional</label>
          <input type="text" id="direccion" name="direccion">
          <small class="error"></small>
        </div>

        <div class="botones">
          <button type="submit" class="btn enviar">Enviar</button>
          <button type="reset" class="btn limpiar">Limpiar</button>
        </div>

        <p id="mensajeFinal"></p>

      </form>
    </section>
  </main>

  <script src="js/registro.js"></script>
</body>
</html>
