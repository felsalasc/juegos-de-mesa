<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Perfil - NortLAB</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" href="catalogo.html">NortLAB</a>

        <div class="d-flex gap-2">
            <a class="btn btn-light btn-sm" href="catalogo.html">Catálogo</a>
            <a class="btn btn-light btn-sm" href="carrito.html">Carrito</a>
            <a class="btn btn-light btn-sm" href="mis-compras.html">Mis Compras</a>
        </div>

        <div id="menuUsuario" class="ms-3"></div>
    </div>
</nav>

<header class="container mt-4">
    <div class="p-4 bg-white rounded shadow-sm">
        <h1 class="mb-2">Mi Perfil</h1>
        <p class="text-muted mb-0">
            Actualiza tu información personal y dirección de despacho.
        </p>
    </div>
</header>

<main class="container mt-4">

    <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">

            <div class="card shadow-sm">
                <div class="card-body">

                    <form id="formPerfil">

                        <div class="mb-3">
                            <label class="form-label">Nombre Completo</label>
                            <input
                                type="text"
                                class="form-control"
                                id="nombre">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Usuario</label>
                            <input
                                type="text"
                                class="form-control"
                                id="usuario"
                                disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Correo Electrónico</label>
                            <input
                                type="email"
                                class="form-control"
                                id="email"
                                disabled>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Fecha de Nacimiento</label>
                            <input
                                type="date"
                                class="form-control"
                                id="fechaNacimiento"
                                disabled>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Dirección de Despacho</label>
                            <textarea
                                class="form-control"
                                id="direccion"
                                rows="3"></textarea>
                        </div>

                        <div class="d-grid gap-2 d-md-flex">
                            <button
                                type="submit"
                                class="btn btn-primary">
                                Guardar Cambios
                            </button>

                            <a
                                href="catalogo.html"
                                class="btn btn-outline-secondary">
                                Volver al Catálogo
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>

</main>

<footer>
    <p class="mb-0">
        NortLAB - Juegos de mesa culturales
    </p>
</footer>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/perfil.js"></script>

</body>
</html>
